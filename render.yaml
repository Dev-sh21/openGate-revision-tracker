services:
  - type: web
    name: revision-tracker
    runtime: node
    plan: free
    buildCommand: npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      # Use Node.js 20 to avoid build crashes on old versions
      - key: NODE_VERSION
        value: 20.20.1
      # Database connection string mapped automatically from the database service below
      - key: DATABASE_URL
        fromDatabase:
          name: revision-tracker-db
          property: connectionString
      # Render will automatically generate a secure secret key for NextAuth and Cron
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      # Fallback values to let the build pass immediately without prompts
      # (Change these in the Render dashboard to your actual live .onrender.com URL later)
      - key: NEXTAUTH_URL
        value: https://revision-tracker.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://revision-tracker.onrender.com
      # Optional OAuth keys (Empty by default so they don't block deployment)
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: NOTION_CLIENT_ID
        value: ""
      - key: NOTION_CLIENT_SECRET
        value: ""

databases:
  - name: revision-tracker-db
    plan: free
    postgresMajorVersion: "15"
